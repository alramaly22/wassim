      <script>
        function sendToWhatsApp() {
  // Get form input values
  const name = document.querySelector('input[name="Name"]').value;
  const MonyTransfer = document.querySelector('input[name="MonyTransfer"]').value;
  const age = document.querySelector('input[name="Age"]').value;
  const weight = document.querySelector('input[name="Weight"]').value;
  const height = document.querySelector('input[name="Height"]').value;
  const neck = document.querySelector('input[name="Neck (cm)"]').value;
  const waist = document.querySelector('input[name="Waist (cm)"]').value;
  const arm = document.querySelector('input[name="Arm (cm)"]').value;
  const favoriteProtein = document.querySelector('textarea[name="Your favorite protein?"]').value;
  const favoriteCarbs = document.querySelector('textarea[name="Your favorite carbohydrates?"]').value;
  const healthProblems = document.querySelector('textarea[name="Do you have health problems?"]').value;
  const workoutDays = document.querySelector('input[name="How many days a week will you exercise?"]').value;

  // Construct the message
  const message = `
    Name: ${name}
    MonyTransfer: ${MonyTransfer}
    Age: ${age}
    Weight: ${weight} kg
    Height: ${height} cm
    Neck: ${neck} cm
    Waist: ${waist} cm
    Arm: ${arm} cm

    Favorite Protein: ${favoriteProtein}
    Favorite Carbohydrates: ${favoriteCarbs}
    Health Problems: ${healthProblems}
    Workout Days: ${workoutDays}
  `;

  // Send the message to WhatsApp
  const encodedMessage = encodeURIComponent(message);
  const whatsappLink = `https://api.whatsapp.com/send?phone=+201158271006&text=${encodedMessage}`;
  window.open(whatsappLink, '_blank');
}

      </script>

      const MonyTransfer = document.getElementById('MonyTransfer');

      MonyTransfer.addEventListener('input', function (event) {
        // Remove any non-Arabic or non-English digits or decimal points from the input
        const input = event.target.value.replace(/[^\u0660-\u0669\u06F0-\u06F90-9.,\s]+/g, '');
        // Replace any Arabic decimal points with English decimal points
        const inputWithEnglishDecimal = input.replace(/[\u066B]/g, '.');
        // Update the input field with the cleaned input
        event.target.value = inputWithEnglishDecimal;
      });

      MonyTransfer.addEventListener('change', function (event) {
        // Validate the input
        const input = event.target.value;
        if (!input || !/^[\u0660-\u0669\u06F0-\u06F90-9.,\s]+$/.test(input)) {
          alert('Please enter a valid age');
          event.target.value = '';
          event.preventDefault();
        }
      });        
    </script>
